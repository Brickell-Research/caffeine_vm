name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.tag || github.ref }}

    - name: Setup BEAM (Erlang + Gleam)
      uses: erlef/setup-beam@v1
      with:
        otp-version: '27'
        gleam-version: '1.14.0'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: gleam deps download

    - name: Build Gleam to JavaScript
      run: gleam build --target javascript

    - name: Extract version
      id: version
      run: |
        VERSION=$(grep '^version' gleam.toml | sed 's/version = "\(.*\)"/\1/')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Version: $VERSION"

    - name: Compile binaries for all platforms
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        mkdir -p dist

        echo "Building Linux x64..."
        bun build --compile --target=bun-linux-x64 \
          --outfile "dist/cvm-${VERSION}-linux-x64" main.mjs

        echo "Building Linux ARM64..."
        bun build --compile --target=bun-linux-arm64 \
          --outfile "dist/cvm-${VERSION}-linux-arm64" main.mjs

        echo "Building macOS x64..."
        bun build --compile --target=bun-darwin-x64 \
          --outfile "dist/cvm-${VERSION}-macos-x64" main.mjs

        echo "Building macOS ARM64..."
        bun build --compile --target=bun-darwin-arm64 \
          --outfile "dist/cvm-${VERSION}-macos-arm64" main.mjs

        echo "Building Windows x64..."
        bun build --compile --target=bun-windows-x64 \
          --outfile "dist/cvm-${VERSION}-windows-x64.exe" main.mjs

        ls -la dist/

    - name: Smoke test Linux x64 binary
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: ./dist/cvm-${VERSION}-linux-x64 help

    - name: Create archives
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        cd dist
        tar -czvf cvm-${VERSION}-linux-x64.tar.gz cvm-${VERSION}-linux-x64
        tar -czvf cvm-${VERSION}-linux-arm64.tar.gz cvm-${VERSION}-linux-arm64
        tar -czvf cvm-${VERSION}-macos-x64.tar.gz cvm-${VERSION}-macos-x64
        tar -czvf cvm-${VERSION}-macos-arm64.tar.gz cvm-${VERSION}-macos-arm64
        zip cvm-${VERSION}-windows-x64.zip cvm-${VERSION}-windows-x64.exe

    - name: Generate SHA256 checksums
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        cd dist
        sha256sum \
          cvm-${VERSION}-linux-x64.tar.gz \
          cvm-${VERSION}-linux-arm64.tar.gz \
          cvm-${VERSION}-macos-x64.tar.gz \
          cvm-${VERSION}-macos-arm64.tar.gz \
          cvm-${VERSION}-windows-x64.zip \
          > cvm-${VERSION}-checksums.sha256

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        generate_release_notes: true
        files: |
          dist/cvm-${{ steps.version.outputs.version }}-linux-x64.tar.gz
          dist/cvm-${{ steps.version.outputs.version }}-linux-arm64.tar.gz
          dist/cvm-${{ steps.version.outputs.version }}-macos-x64.tar.gz
          dist/cvm-${{ steps.version.outputs.version }}-macos-arm64.tar.gz
          dist/cvm-${{ steps.version.outputs.version }}-windows-x64.zip
          dist/cvm-${{ steps.version.outputs.version }}-checksums.sha256

    - name: Update Homebrew formula
      env:
        HOMEBREW_TAP_TOKEN: ${{ secrets.GH_TOKEN }}
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        SHA_MACOS_X64=$(sha256sum dist/cvm-${VERSION}-macos-x64.tar.gz | cut -d' ' -f1)
        SHA_MACOS_ARM64=$(sha256sum dist/cvm-${VERSION}-macos-arm64.tar.gz | cut -d' ' -f1)
        SHA_LINUX_X64=$(sha256sum dist/cvm-${VERSION}-linux-x64.tar.gz | cut -d' ' -f1)

        git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/brickell-research/homebrew-caffeine.git" tap
        cd tap

        # Only touch cvm.rb — never modify caffeine_lang.rb
        cat > Formula/cvm.rb << FORMULA_END
        class Cvm < Formula
          desc "Caffeine Version Manager"
          homepage "https://github.com/Brickell-Research/caffeine_vm"
          license "MIT"
          version "${VERSION}"

          if OS.mac? && Hardware::CPU.intel?
            url "https://github.com/Brickell-Research/caffeine_vm/releases/download/v${VERSION}/cvm-${VERSION}-macos-x64.tar.gz"
            sha256 "${SHA_MACOS_X64}"
          elsif OS.mac? && Hardware::CPU.arm?
            url "https://github.com/Brickell-Research/caffeine_vm/releases/download/v${VERSION}/cvm-${VERSION}-macos-arm64.tar.gz"
            sha256 "${SHA_MACOS_ARM64}"
          elsif OS.linux? && Hardware::CPU.intel?
            url "https://github.com/Brickell-Research/caffeine_vm/releases/download/v${VERSION}/cvm-${VERSION}-linux-x64.tar.gz"
            sha256 "${SHA_LINUX_X64}"
          end

          def install
            if OS.mac? && Hardware::CPU.intel?
              bin.install "cvm-#{version}-macos-x64" => "cvm"
            elsif OS.mac? && Hardware::CPU.arm?
              bin.install "cvm-#{version}-macos-arm64" => "cvm"
            elsif OS.linux? && Hardware::CPU.intel?
              bin.install "cvm-#{version}-linux-x64" => "cvm"
            end
          end

          def caveats
            <<~EOS
              To use caffeine versions managed by cvm, add this to your shell config:

                export PATH="$HOME/.cvm/current:$PATH"

              Then run: cvm install latest
            EOS
          end

          test do
            assert_match "Caffeine Version Manager", shell_output("#{bin}/cvm help")
          end
        end
        FORMULA_END

        sed -i 's/^        //' Formula/cvm.rb

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Only stage cvm.rb — explicit path prevents touching caffeine_lang.rb
        git add Formula/cvm.rb
        if git diff --cached --quiet; then
          echo "Homebrew formula already up to date"
        else
          git commit -m "Update cvm to ${VERSION}"
          git push origin main
          echo "Homebrew cvm formula updated to ${VERSION}"
        fi
